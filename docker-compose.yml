version: "3.9"

services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data/sessions:/app/data/sessions
    ports:
      - "9091:9090"  # bot metrics endpoint (Prometheus scrapes внутри сети, 9091 для ручной проверки)
    restart: unless-stopped
    networks:
      - pfa_net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"  # Prometheus UI: http://localhost:9090
    restart: unless-stopped
    networks:
      - pfa_net

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - pfa_net

  # Langfuse — self-hosted LLM трейсинг (раскомментировать для локального трейсинга)
  # После запуска: http://localhost:3001 → создай аккаунт → Settings → API Keys
